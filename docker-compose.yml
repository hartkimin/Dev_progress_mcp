version: '3.8'

name: vibeplanner

services:
  postgres:
    image: postgres:16-alpine
    container_name: vibeplanner-postgres
    environment:
      - POSTGRES_USER=vibeplanner
      - POSTGRES_PASSWORD=vibeplanner_secret
      - POSTGRES_DB=vibeplanner
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vibeplanner" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vibeplanner-api
    ports:
      - "3333:3333"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3333
      - DATABASE_URL=postgresql://vibeplanner:vibeplanner_secret@postgres:5432/vibeplanner

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vibeplanner-web
    ports:
      - "3002:8183"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      - PORT=8183
      - API_BASE_URL=http://api:3333/api/v1 # Route to internal API container

volumes:
  pgdata:
